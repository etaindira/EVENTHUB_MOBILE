name: eventhub_mobile
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  dio: ^5.9.2

  # State Management
  provider: ^6.1.5+1

  # Secure Storage
  flutter_secure_storage: ^10.3.0

  # Images
  image_picker: ^1.2.1

  # Fonts
  google_fonts: ^6.3.2

  # Date Formatting
  intl: ^0.20.2

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Realtime Updates
  socket_io_client: ^3.0.2

  # Navigation
  go_router: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/invitations/
    - assets/images/invitations/elegant_classic/
    - assets/images/invitations/modern_minimal/
    - assets/images/invitations/bold_celebration/
    - assets/images/invitations/luxury_gold/
    - assets/images/invitations/simple_formal/